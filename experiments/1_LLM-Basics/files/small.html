<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foodora - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(20 14.3% 4.1%)',
                        card: {
                            DEFAULT: 'hsl(0 0% 100%)',
                            foreground: 'hsl(20 14.3% 4.1%)'
                        },
                        primary: {
                            DEFAULT: 'hsl(16 100% 55%)',
                            foreground: 'hsl(0 0% 98%)'
                        },
                        muted: {
                            DEFAULT: 'hsl(60 4.8% 95.9%)',
                            foreground: 'hsl(25 5.3% 44.7%)'
                        },
                        border: 'hsl(20 5.9% 90%)',
                        input: 'hsl(20 5.9% 90%)',
                        ring: 'hsl(16 100% 55%)',
                    },
                    borderRadius: {
                        lg: '0.75rem',
                        md: 'calc(0.75rem - 2px)',
                        sm: 'calc(0.75rem - 4px)'
                    },
                },
            },
        }
    </script>
    <style>
        .bg-gradient-primary {
            background-image: linear-gradient(135deg, hsl(16 100% 55%), hsl(0 84% 60%));
        }
    </style>
</head>

<body class="bg-background text-foreground">
    <div class="min-h-screen bg-background flex items-center justify-center p-4">
        <div class="rounded-lg border bg-card text-card-foreground shadow-sm w-full max-w-md">
            <div class="flex flex-col space-y-1.5 p-6 text-center"><a class="flex items-center justify-center gap-2 mb-4" href="/">
                    <div class="w-8 h-8 bg-gradient-primary rounded-lg flex items-center justify-center"><span class="text-white font-bold text-lg">F</span></div><span class="text-xl font-bold bg-gradient-primary bg-clip-text text-transparent">Foodora</span>
                </a>
                <h3 class="font-semibold tracking-tight text-2xl">Welcome Back</h3>
                <p class="text-sm text-muted-foreground">Sign in to your account</p>
            </div>
            <div class="p-6 pt-0">
                <form class="space-y-4">
                    <div class="space-y-2"><label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70" for="email">Email</label>
                        <div class="relative"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail absolute left-3 top-3 h-4 w-4 text-muted-foreground">
                                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                            </svg><input type="email" class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-base ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm pl-9" id="email" placeholder="you@example.com" required="" value=""></div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex items-center justify-between"><label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70" for="password">Password</label><button type="button" class="text-xs text-primary hover:underline">Forgot password?</button></div>
                        <div class="relative"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock absolute left-3 top-3 h-4 w-4 text-muted-foreground">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg><input type="password" class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-base ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 md:text-sm pl-9" id="password" placeholder="••••••••" required="" minlength="6" value=""></div>
                    </div><button class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 [&amp;_svg]:pointer-events-none [&amp;_svg]:size-4 [&amp;_svg]:shrink-0 text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 w-full bg-gradient-primary hover:opacity-90" type="submit">Sign In</button>
                </form>
                <div class="mt-6 text-center text-sm text-muted-foreground">Don't have an account? <button class="text-primary hover:underline font-medium">Sign Up</button></div>
            </div>
        </div>
    </div>
</body>

</html>
